<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me for Patterns</title>
    <meta name="description" content="Pattern request form">
    <meta name="keywords" content="Pattern request form">
    <meta name="author" content="Keyarra Bassett">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../project/styles/style.css">
    <link rel="stylesheet" href="../project/styles/style-large.css">
    <link rel="stylesheet" href="../project/styles/contact.css">

</head>

<body>
    <header>
        <img src="../project/images/crochet-logo.webp" alt="A logo of a crochet hook and ball of yarn" width="354"
            height="354">
        <button id="menu"></button>
        <nav class="navigation">
            <a  href="../project/index.html">Home</a>
            <a href="../project/project.html">Projects</a>
            <a href="../project/contact.html">Contact me for Patterns</a>
        </nav>
    </header>

    <main class="container-contact">
        <section class="contact-box">
           
            <div class="form-container">
                <form action="../project/my-handling-form-page" method="post">
                    <h1>Contact me</h1>
                    <ul>
                        <li>
                            <label for="name">Name:</label>
                            <input type="text" id="name" name="user_name" required />
                        </li>
                        <li>
                            <label for="mail">Email:</label>
                            <input type="email" id="mail" name="user_email" required />
                        </li>
                        <li>
                            <label for="msg">Pattern:</label>
                            <textarea id="msg" name="user_message" required></textarea>
                        </li>
                        <li>
                            <button type="submit">Send your message!</button>
                        </li>
                    </ul>
                </form>
            </div>
            <div class="final-contact">
                <h3>Did you like one of my Projects?</h3>
                <p>Send me a message, I am more then happy to share my patterns. I am also willing to help teach more about crochet. </p>
            </div>
        </section>
    </main>

 <footer>
        <p>
            <span id="currentyear">year </span> | Keyarra Bassett | United States
        </p>
        <p id="lastModified">Lorem ipsum dolor, sit amet consectetur </p>
    </footer>
    <script src="../project/scripts/getdates.js" defer></script>>

</body>

</html>
